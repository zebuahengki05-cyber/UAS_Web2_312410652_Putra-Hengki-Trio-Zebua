<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Artikel - Admin Panel</title>
    
    <link rel="stylesheet" href="assets/css/style.css?v=1">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>

    <div id="app" class="d-flex">
        
        <aside class="sidebar">
            <h4>Admin Panel</h4>
            <nav class="nav-menu">
                <router-link to="/">Beranda</router-link>
                <router-link to="/artikel">Kelola Artikel</router-link>
                <router-link to="/about">About</router-link>
                
                <router-link v-if="!isLoggedIn" to="/login">Login</router-link>
                <a v-else href="#" @click.prevent="logout" class="logout-link">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Dashboard Manajemen</h1>
            </header>
            
            <router-view></router-view>
        </main>
        
    </div>

    <script src="assets/js/components/Home.js"></script>
    <script src="assets/js/components/Artikel.js"></script>
    <script src="assets/js/components/About.js"></script>
    <script src="assets/js/components/Login.js"></script>

    <script src="assets/js/app.js"></script>
    
</body>
</html>
